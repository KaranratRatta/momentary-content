# ─── Script-to-Image Pipeline Configuration ────────────────────────────────
# Change `style` to switch between visual styles (ms_paint, realistic, anime).
# Change `model` to use a different FAL model.

pipeline:
  style: "ms_paint"              # Style template name (matches styles/<name>.yaml)
  model: "fal-ai/flux/schnell"   # FAL model endpoint
  concurrency: 8                 # How many images to generate in parallel
  output_dir: "./output"

parser:
  # Regex pattern to extract timestamps. Supports HH:MM:SS, MM:SS, and SS formats.
  timestamp_pattern: "(\\d{1,2}:\\d{2}(?::\\d{2})?)"

prompt_builder:
  # LLM used to write visual scene prompts (OpenRouter, OpenAI-compatible API).
  # Set OPENROUTER_API_KEY in your environment. Without it, a simple offline
  # fallback is used so --skip-generate previews still work.
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  model: "z-ai/glm-5.2@preset/main"   # any model id served by OpenRouter
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.8                    # higher = more creative scene depictions
  concurrency: 8                      # parallel LLM calls for scene prompts
  build_bible: true                   # build a character/visual bible first

generator:
  num_inference_steps: 4         # Lower = faster, less detail. 4 is good for MS Paint.
  sync_mode: "sync"              # "sync" or "async" — sync is simpler for small batches
  image_size: "landscape_16_9"   # landscape_16_9, square_hd, portrait_16_9, etc.

video:                           # Future: video assembly settings
  fps: 30
  transition: "fade"
  transition_duration: 0.3
  output_format: "mp4"