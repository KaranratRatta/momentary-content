# ─── Script-to-Image Pipeline Configuration ────────────────────────────────

pipeline:
  style: "ms_paint"                 # Style template name (matches styles/<name>.yaml)
  model: "fal-ai/krea-2/turbo"       # FAL model endpoint
  concurrency: 8
  output_dir: "./output"

parser:
  timestamp_pattern: "(\\d{1,2}:\\d{2}(?::\\d{2})?)"

prompt_builder:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  model: "z-ai/glm-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.8
  concurrency: 8
  build_bible: true

generator:
  image_size: "landscape_16_9"
  output_format: "png"
  enable_prompt_expansion: true      # krea-2/turbo: LLM expands prompts for better quality

reviewer:
  # Review is opt-in via --review flag (requires a vision-capable LLM model)
  min_score: 3                       # Minimum overall score to pass (1-5)
  max_retries: 2                     # Max regeneration attempts per image
  model: "google/gemini-2.0-flash-exp:free" # Optional: vision-capable model for review

video:
  fps: 30
  transition: "fade"
  transition_duration: 0.3
  output_format: "mp4"
