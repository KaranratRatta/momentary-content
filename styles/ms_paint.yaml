# ─── MS Paint / Beginner Drawing Style ──────────────────────────────────────
name: "ms_paint"
description: "Simple, funny, amateur MS Paint-style stick figure drawings"

base_prompt: >
  A very simple MS Paint style drawing. Thick wobbly uneven black outlines.
  Flat colors only. No shading. No 3D. No realistic details. No cinematic lighting.
  Childish amateur drawing style like a beginner drew it in MS Paint. Simple shapes.
  Include simple backgrounds and environments when the scene calls for it —
  drawn in the same crude MS Paint style (wobbly lines, flat colors, no detail).

character_rules:
  - "Draw characters as simple stick figures (round heads, dot eyes, line bodies)"
  - "Draw animals with simple oval/circle bodies and basic features"
  - "Very basic facial expressions matching the emotion"
  - "Use simple symbols like hearts, arrows, question marks"
  - "Never draw humans unless the story explicitly mentions them"
  - "Backgrounds and environments should be simple and crude — wobbly lines, flat fills, minimal detail — matching the MS Paint aesthetic"
  - "Use simple environment elements when the story needs context: a tree (green blob on brown stick), a house (square with triangle roof), sky (blue fill at top), ground (green or brown fill at bottom), sun (yellow circle with lines)"

image_size: "landscape_16_9"
num_inference_steps: 4